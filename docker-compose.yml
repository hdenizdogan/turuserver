  caddy-cloudflare: # for local reverse proxy via dns redirection
    image: ghcr.io/caddybuilds/caddy-cloudflare:latest
    container_name: caddy-cloudflare
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./old/Caddyfile:/etc/caddy/Caddyfile:ro
      - /mnt/docker/caddy-cloudflare/caddy_data:/data
      - /mnt/docker/tsdproxy/data/default:/certs:ro
  #      - /mnt/docker/caddy/caddy_config:/config
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - DOMAIN=${DOMAIN}
      - OLDDOMAIN=${OLDDOMAIN}

#        ipv4_address: 172.19.0.199

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    container_name: cloudflared
#    deploy:
#      replicas: 2
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}


  dash: # reverse proxy to 3001
    image: mauricenino/dashdot:latest
    container_name: dash
    restart: unless-stopped
    privileged: true
    ports:
      - "3001:3001"
    environment:
      - DASHDOT_WIDGET_LIST=os,cpu,storage,ram,network
      - DASHDOT_SHOW_DASH_VERSION=bottom_right
      - DASHDOT_ENABLE_CPU_TEMPS=true
      - DASHDOT_ALWAYS_SHOW_PERCENTAGES=true
      - DASHDOT_ACCEPT_OOKLA_EULA=true
      - DASHDOT_SHOW_HOST=true
    volumes:
      - /:/mnt/host:ro


  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
  #    labels:
  #      com.centurylinklabs.watchtower.enable: false
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
    # DB_STORAGE_TYPE: 'HDD'
    volumes:
    # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - /mnt/docker/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped


