    image: jellyfin/jellyfin
    container_name: jellyfin
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "jellyfin"
      tsdproxy.funnel: "true"
      tsdproxy.port: "8096"
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/docker/jellyfin_config:/config
      - /mnt/docker/jellyfin_cache:/cache
      - /mnt/media/torrent:/media/torrent
      - /opt/jellyfin-fonts:/usr/share/fonts/truetype/jellyfin-fonts:ro
    environment:
      - TZ=${TZ}
#    network_mode: host
    ports:
      - "8096:8096"


  lidatube: # reverse proxy to 5000
    image: thewicklowwolf/lidatube:latest
    container_name: lidatube
    volumes:
      - /mnt/docker/lidatube:/lidatube/config
      - /mnt/media/torrent/Music:/lidatube/downloads
      - /etc/localtime:/etc/localtime:ro
    ports:
