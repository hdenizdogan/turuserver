  immich: # reverse proxy to 2283
    container_name: immich
    image: ghcr.io/immich-app/immich-server:release
    devices:
      - /dev/dri:/dev/dri
    volumes:
    # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - /mnt/immichdata:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USERNAME=${DB_USERNAME}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME}
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: unless-stopped


  immich-machine-learning:
    container_name: immich_machine_learning
  # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
  # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:release-openvino
  # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
  #   file: hwaccel.ml.yml
  #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - /mnt/docker/immich/immich_machine_learning/cache:/cache
    restart: unless-stopped
    extends:
      file: hwaccel.ml.yml
      service: openvino


  jellystat: # reverse proxy to 3000
    image: 'cyfershepard/jellystat:latest'
    container_name: jellystat
    restart: unless-stopped
    environment:
      POSTGRES_USER: $JELLYSTATDB_POSTGRES_USER
      POSTGRES_PASSWORD: $JELLYSTATDB_POSTGRES_PASSWORD
      POSTGRES_IP: $JELLYSTATDB_POSTGRES_IP
      POSTGRES_PORT: $JELLYSTATDB_POSTGRES_PORT
      JWT_SECRET: $JELLYSTAT_JWT_SECRET
      TZ: $TZ
    volumes:
      - /mnt/docker/jellystat/jellystat-backup-data:/app/backend/backup-data
#    ports:
#      - '3000:3000'
    depends_on:
      - jellystat-db


  jellystat-db:
    image: 'postgres:15.2'
    shm_size: 1gb
    container_name: jellystat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: $JELLYSTATDB_POSTGRES_USER
      POSTGRES_PASSWORD: $JELLYSTATDB_POSTGRES_PASSWORD
    volumes:
      - /mnt/docker/jellystat/jellystat-db/postgres-data:/var/lib/postgresql/data


