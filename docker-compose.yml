      - /mnt/media/torrent/Music:/music
      - /mnt/media/torrent/downloads:/downloads
      - /mnt/media/torrent/staging:/staging
      - /mnt/media/torrent/Manual Download:/Manual Download
    ports:
      - "8686:8686"
    restart: unless-stopped


