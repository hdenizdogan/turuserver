  tsdproxy: # reverse proxy to 8080
    image: almeidapaulopt/tsdproxy:2
    container_name: tsdproxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/docker/tsdproxy/data:/data
      - /mnt/docker/tsdproxy/config:/config
    restart: unless-stopped
#    environment:
#      - TS_AUTHKEY=${TS_AUTHKEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"


  unmanic: # reverse proxy to 8888
    image: josh5/unmanic:latest
    container_name: unmanic
    restart: unless-stopped
  #    labels:
  #      tsdproxy.enable: "true"
  #      tsdproxy.name: "unmanic"
  #      tsdproxy.funnel: "true"
  #      tsdproxy.container_port: 8888
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /mnt/docker/unmanic:/config
      - /mnt/media/torrent:/library
      - /tmp/unmanic:/tmp/unmanic
    ports:
      - "8888:8888"
    devices:
      - /dev/dri:/dev/dri

  watchtower:
    image: nickfedor/watchtower
    restart: unless-stopped
    container_name: watchtower
    environment:
      - TZ=${TZ}
      - WATCHTOWER_NOTIFICATIONS_HOSTNAME=$HOSTNAME
      - WATCHTOWER_NOTIFICATION_URL=$WATCHTOWER_NOTIFICATION_URL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --no-startup-message --include-restarting --schedule "0 0 4 * * *"

