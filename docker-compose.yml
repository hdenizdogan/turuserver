  feishin: # reverse proxy to http://feishin:9180
    container_name: feishin
    image: 'ghcr.io/jeffvli/feishin:latest'
    restart: unless-stopped
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "feishin"
      tsdproxy.funnel: "true"
      tsdproxy.port: "9180"
    environment:
      - SERVER_NAME=navidrome # pre-defined server name
      - SERVER_LOCK=false # When true AND name/type/url are set, only username/password can be toggled
      - SERVER_TYPE=navidrome # the allowed types are: jellyfin, navidrome, subsonic. These values are case insensitive
      - SERVER_URL=https://navidrome.${DOMAIN} # http://address:port or https://address:port
      - REMOTE_URL=https://navidrome.${DOMAIN} # http://address or https://address
      - LEGACY_AUTHENTICATION=false # When SERVER_LOCK is true, sets the legacy (plaintext) authentication flag for Subsonic/OpenSubsonic servers
      - ANALYTICS_DISABLED=true # Set to true to disable Umami analytics tracking
    ports:
      - 9180:9180


  flaresolverr: # reverse proxy to 8191
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - CAPTCHA_SOLVER=none
    ports:
      - "8191:8191"
    volumes:
      - /mnt/docker/flaresolverr:/config


