  navidrome: # reverse proxy to 4533
    container_name: navidrome
    image: deluan/navidrome:latest
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "navidrome"
      tsdproxy.funnel: "true"
      tsdproxy.port: "4533"
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      - ND_BASEURL=https://navidrome.${DOMAIN}
      - ND_PLAYLISTSPATH=/music/Playlists
      - ND_SUBSONIC_DEFAULTREPORTREALPATH=true
      - ND_LYRICSPRIORITY=.ttml,.yaml,.yml,.elrc,.lrc,.srt,.txt,embedded,nd-lyrics
      - ND_LASTFM_ENABLED=true
      - ND_LASTFM_APIKEY=${ND_LASTFM_APIKEY}
      - ND_LASTFM_SECRET=${ND_LASTFM_SECRET}
      - ND_SESSIONTIMEOUT=720h
      - TZ=${TZ}
    volumes:
      - "/mnt/docker/navidrome:/data"
      - "/mnt/media/torrent/Music:/music"


